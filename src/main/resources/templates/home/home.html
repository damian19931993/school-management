<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión Escolar</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">
    <style>
        body {
            padding-top: 56px;
        }
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            z-index: 1;
            top: 56px; /* Height of navbar */
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
        }
        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: #333;
            display: block;
        }
        .sidebar a:hover {
            color: #007bff;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- Barra de Navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <a class="navbar-brand" href="#">Gestión Escolar</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item active">
                <a class="nav-link" href="#">Inicio</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Cursos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/student}">Estudiantes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Docentes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Materias</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Menú Lateral -->
<div class="sidebar">
    <a href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a th:href="@{/student}"><i class="fas fa-user-graduate"></i> Estudiantes</a>
    <a href="#"><i class="fas fa-chalkboard-teacher"></i> Docentes</a>
    <a href="#"><i class="fas fa-book"></i> Cursos</a>
    <a href="#"><i class="fas fa-book-open"></i> Materias</a>
</div>

<!-- Contenido Principal -->
<div class="content">
    <h1>Bienvenido al Sistema de Gestión Escolar</h1>
    <p>Este es el panel principal donde se puede mostrar información relevante, noticias, anuncios, etc.</p>
    <!-- Más contenido y componentes aquí -->
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
