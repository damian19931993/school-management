<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Materias a Curso</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-3">
    <h2>Asignar Materias al Curso</h2>
    <form th:action="@{/course/saveAssignedSubjects/{courseId}(courseId=${courseId})}" method="post">
        <div class="form-group">
            <label>Selecciona las materias a asignar:</label>
            <div th:each="subject : ${activeSubjects}">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="subjectIds" th:value="${subject.id}" id="subject_${subject.id}">
                    <label class="form-check-label" th:for="${'subject_' + subject.id}" th:text="${subject.subjectName}"></label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Asignar Materias</button>
    </form>
</div>
</body>
</html>
