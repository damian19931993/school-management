<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión Escolar - Estudiantes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">
    <style>
        body {
            padding-top: 56px;
        }
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            z-index: 1;
            top: 56px;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
        }
        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: #333;
            display: block;
        }
        .sidebar a:hover {
            color: #007bff;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-input {
            width: 250px; /* Ajuste del ancho del buscador */
        }
        .add-student-button {
            display: block;
        }
    </style>
</head>
<body>

<!-- Barra de Navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <a class="navbar-brand" href="#">Gestión Escolar</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ml-auto">
            <!-- Elementos del menú -->
        </ul>
    </div>
</nav>

<!-- Menú Lateral -->
<div class="sidebar">
    <!-- Elementos del menú lateral -->
</div>

<!-- Contenido Principal -->
<div class="content">
    <div class="header">
        <h1>Estudiantes</h1>
    </div>
    <div class="search-bar">
        <form th:action="@{/student/search}" method="get">
            <input type="text" name="dni" class="form-control d-inline-block search-input" placeholder="Buscar estudiante por DNI...">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>
    </div>
    <a th:href="@{/student/create}" class="btn btn-primary btn-sm mb-3">Agregar Estudiante</a>
    <!-- Aquí puedes agregar más contenido como tablas o información adicional -->
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
