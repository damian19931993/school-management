<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Estudiante</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
        .card {
            border-radius: 15px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
            border-radius: 15px 15px 0 0;
        }
        .card-body {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-check-label {
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h5 class="card-header text-center">Registro de Estudiante</h5>
        <div class="card-body">
            <form th:action="@{/student/save}" th:object="${student}" method="post">
                <div class="form-group">
                    <label for="firstName">Primer Nombre:</label>
                    <input type="text" id="firstName" class="form-control" th:field="*{firstName}" placeholder="Ingrese el primer nombre">
                </div>
                <div class="form-group">
                    <label for="middleName">Segundo Nombre:</label>
                    <input type="text" id="middleName" class="form-control" th:field="*{middleName}" placeholder="Ingrese el segundo nombre">
                </div>
                <div class="form-group">
                    <label for="lastName">Apellido:</label>
                    <input type="text" id="lastName" class="form-control" th:field="*{lastName}" placeholder="Ingrese el apellido">
                </div>
                <div class="form-group">
                    <label for="dni">DNI:</label>
                    <input type="text" id="dni" class="form-control" th:field="*{dni}" placeholder="Ingrese el DNI">
                </div>
                <div class="form-check">
                    <input type="checkbox" id="isActive" class="form-check-input" th:field="*{active}">
                    <label class="form-check-label" for="isActive">Activo</label>
                </div>
                <!-- Campos para StudentDetail -->
                <div class="form-group">
                    <label for="address">Dirección:</label>
                    <input type="text" id="address" class="form-control" th:field="*{studentDetail.address}" placeholder="Ingrese la dirección">
                </div>
                <div class="form-group">
                    <label for="phone1">Teléfono 1:</label>
                    <input type="text" id="phone1" class="form-control" th:field="*{studentDetail.phone1}" placeholder="Ingrese el primer teléfono">
                </div>
                <div class="form-group">
                    <label for="phone2">Teléfono 2:</label>
                    <input type="text" id="phone2" class="form-control" th:field="*{studentDetail.phone2}" placeholder="Ingrese el segundo teléfono">
                </div>
                <div class="form-group">
                    <label for="phone3">Teléfono 3:</label>
                    <input type="text" id="phone3" class="form-control" th:field="*{studentDetail.phone3}" placeholder="Ingrese el tercer teléfono">
                </div>
                <div class="form-group">
                    <label for="responsible1Fullname">Responsable 1:</label>
                    <input type="text" id="responsible1Fullname" class="form-control" th:field="*{studentDetail.responsible1Fullname}" placeholder="Responsable 1">
                </div>
                <div class="form-group">
                    <label for="responsible2Fullname">Responsable 2:</label>
                    <input type="text" id="responsible2Fullname" class="form-control" th:field="*{studentDetail.responsible2Fullname}" placeholder="Responsable 2">
                </div>
                <div class="form-group">
                    <label for="responsible3Fullname">Responsable 3:</label>
                    <input type="text" id="responsible3Fullname" class="form-control" th:field="*{studentDetail.responsible3Fullname}" placeholder="Responsable 3">
                </div>
                <div class="form-group">
                    <label for="photo">Foto:</label>
                    <input type="file" id="photo" class="form-control" th:field="*{studentDetail.photoPath}">
                </div>

                <button type="submit" class="btn btn-primary mt-4 w-100">Guardar</button>

            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
