<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Calificaciones</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-3">
    <h2>Agregar Calificaciones para: <span th:text="${course.grade}"></span></h2>
    <form th:action="@{/teacher/saveMarks(courseId=${course.id})}" method="post">
        <div class="form-group">
            <label for="subject">Materia:</label>
            <select id="subject" name="subjectId" class="form-control">
                <option th:each="subject : ${activeSubjects}" th:value="${subject.schoolSubject.id}" th:text="${subject.schoolSubject.subjectName}"></option>
            </select>
        </div>
        <div th:each="student, iterStat : ${students}">
            <div class="form-group">
                <label th:for="${'student-' + iterStat.index}">Estudiante:</label>
                <input type="text" readonly th:value="${student.firstName}" class="form-control"/>
                <input type="hidden" th:name="'marks[' + ${iterStat.index} + '].studentId'" th:value="${student.id}"/>

                <label th:for="${'mark-' + iterStat.index}">Calificación:</label>
                <input type="number" th:name="'marks[' + ${iterStat.index} + '].grade'" class="form-control"/>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Guardar Calificaciones</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
