<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Cursos Activos</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Mis Cursos Activos</h2>
    <table class="table">
        <thead>
        <tr>
            <th>Curso</th>
            <th>Grado</th>
            <th>División</th>
            <th>Materia</th>
        </tr>
        </thead>
        <tbody>
        <!-- Itera sobre cada entrada del mapa -->
        <tr th:each="entry : ${courseSubjectsMap}">
            <td th:text="${entry.key.grade} + ' ' + ${entry.key.division} + ' - ' + ${entry.key.orientation}"></td>
            <td th:text="${entry.key.grade}"></td>
            <td th:text="${entry.key.division}"></td>
            <!-- Para la columna de materias, necesitamos otro loop interno -->
            <td>
                <ul>
                    <!-- Itera sobre cada materia en la lista para el curso actual -->
                    <li th:each="subject : ${entry.value}" th:text="${subject.subjectName}"></li>
                </ul>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
