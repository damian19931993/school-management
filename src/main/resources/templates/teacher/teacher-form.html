<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Docente</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Crear Nuevo Docente</h2>
    <form th:action="@{/teacher/save}" th:object="${teacher}" method="post">
        <div class="form-group">
            <label for="firstName">Nombre:</label>
            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" placeholder="Ingrese el nombre">
        </div>
        <div class="form-group">
            <label for="lastName">Apellido:</label>
            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" placeholder="Ingrese el apellido">
        </div>
        <div class="form-group">
            <label for="dni">DNI:</label>
            <input type="text" class="form-control" id="dni" th:field="*{dni}" placeholder="Ingrese el DNI">
        </div>
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Ingrese el correo electrónico">
        </div>
        <div class="form-group">
            <label for="startDate">Fecha de Alta:</label>
            <input type="date" class="form-control" id="startDate" th:field="*{startDate}" placeholder="Ingrese la fecha de alta">
        </div>
        <div class="form-group">
            <label for="endDate">Fecha de Cese:</label>
            <input type="date" class="form-control" id="endDate" th:field="*{endDate}" placeholder="Ingrese la fecha de cese">
        </div>
        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="isActive" th:field="*{active}">
            <label class="form-check-label" for="isActive">Activo</label>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
