<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Asignaciones</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .container {
            max-width: 600px;
        }
        .checkbox-group {
            border: 1px solid #ced4da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-check-label {
            margin-left: 5px;
        }
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .form-header h2 {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="form-header">
        <h2>Eliminar Asignaciones</h2>
        <button type="submit" form="deleteAssignmentForm" class="btn btn-danger">Eliminar Seleccionados</button>
    </div>
    <form id="deleteAssignmentForm" th:action="@{/teacher/deleteAssignment}" >
        <input type="hidden" th:value="${teacherId}" name="teacherId"/>
        <div class="checkbox-group">
            <div th:each="assignment, iterStat : ${assignments}">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:value="${assignment.schoolSubject.id}" name="subjectId" th:id="${'assignment' + iterStat.index}"/>
                    <label class="form-check-label" th:for="${'assignment' + iterStat.index}" th:text="${assignment.schoolSubject.subjectName}">Materia</label>
                </div>
            </div>
        </div>
    </form>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js" integrity="sha384-ZzWtAowoX0N0Hpt4ZrXjw7HSp/cQSJsymVqmuXoeWuB41mktFpv31vu2wp4yCv3z" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8sh+Wy4Ck4SOF4y4Ck4C2DgHfViXydVeLm+JDM" crossorigin="anonymous"></script>

</body>
</html>
