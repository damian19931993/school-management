<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Sistema de Gestión Escolar</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: auto;
            margin-top: 50px;
        }
        .form-signin {
            width: 100%;
            padding: 15px;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title text-center">Iniciar Sesión</h2>
            <form action="" th:action="@{/authenticateTheUser}" method="POST" class="form-horizontal">
                <div class="form-group">
                    <label for="inputUsername">Nombre de usuario</label>
                    <input type="text" id="inputUsername" class="form-control" placeholder="Usuario" required autofocus name="username">
                </div>
                <div class="form-group">
                    <label for="inputPassword">Contraseña</label>
                    <input type="password" id="inputPassword" class="form-control" placeholder="Contraseña" required name="password">
                </div>
                <button class="btn btn-lg btn-primary btn-block" type="submit">Iniciar Sesión</button>
                <div class="text-center mt-4">
                    <a href="#">¿Olvidaste tu contraseña?</a><br>
                    <a href="#">Registrarse</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
