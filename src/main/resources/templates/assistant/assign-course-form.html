<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Cursos</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2>Asignar Cursos</h2>

    <form th:action="@{/assistant/assignCourses}" th:object="${assignmentForm}" method="post">
        <table class="table">
            <thead class="thead-light">
            <tr>
                <th>Curso</th>
                <th>Seleccionar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${activeCourses}">
                <td th:text="${course.grade}">Nombre del Curso</td>
                <td th:text="${course.division}">Nombre del Curso</td>
                <td th:text="${course.shift}">Nombre del Curso</td>
                <td th:text="${course.orientation}">Nombre del Curso</td>
                <td>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:value="${course.id}" th:name="courseIds">
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Campo oculto para enviar el ID del asistente -->
        <input type="hidden" th:value="${assistantId}" name="assistantId"/>

        <button type="submit" class="btn btn-primary">Asignar</button>
    </form>
</div>

<!-- Bootstrap JS y dependencias -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
