<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Preceptores</h2>
    <div class="text-right mb-3">
        <a th:href="@{/assistant/create}" class="btn btn-primary">Agregar Preceptor</a>
    </div>
    <div>
        <input type="text" id="searchBox" class="form-control mb-3" placeholder="Buscar preceptor...">
    </div>
    <table class="table">
        <thead class="thead-dark">
        <tr>
            <th>Nombre y Apellido</th>
            <th>Rol</th>
            <th>Cursos Asignados</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="assistant : ${assistants}">
            <td th:text="${assistant.firstName} + ' ' + ${assistant.lastName}">Nombre y Apellido</td>
            <td>
                <span th:each="authority : ${assistant.user?.authority}" th:text="${authority.authority}"></span>
            </td>
            <td>
                <ul>
                    <li th:each="course : ${assistant.courses}" th:text="${course.grade} + ' ' + ${course.division} + ' - ' + ${course.orientation} + ' (' + ${course.shift} + ')'">Curso</li>
                </ul>
            </td>
            <td>
                <!-- Nueva celda con el botón de asignar curso -->
                <a th:href="@{/assistant/create/{id}(id=${assistant.id})}" class="btn btn-primary">Asignar Curso</a>
                <a th:href="@{/assistant/assignRole/{id}(id=${assistant.id})}" class="btn btn-primary">Asignar Rol</a>

            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
